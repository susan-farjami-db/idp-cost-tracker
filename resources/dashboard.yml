                              "type": "max",
                              "places": 2
                            }
                          }
                        }
                      }
                    }
                  },
                  "position": {
                    "x": 8,
                    "y": 3,
                    "width": 4,
                    "height": 3
                  }
                },
                {
                  "widget": {
                    "name": "trend_by_function",
                    "queries": [
                      {
                        "name": "main_query",
                        "query": {
                          "datasetName": "ds_daily_trend",
                          "fields": [
                            {
                              "name": "usage_date",
                              "expression": "`usage_date`"
                            },
                            {
                              "name": "ai_function",
                              "expression": "`ai_function`"
                            },
                            {
                              "name": "sum(cost_usd)",
                              "expression": "SUM(`cost_usd`)"
                            }
                          ],
                          "disaggregated": false
                        }
                      }
                    ],
                    "spec": {
                      "version": 3,
                      "widgetType": "line",
                      "encodings": {
                        "x": {
                          "fieldName": "usage_date",
                          "scale": {
                            "type": "temporal"
                          },
                          "displayName": "Date"
                        },
                        "y": {
                          "fieldName": "sum(cost_usd)",
                          "scale": {
                            "type": "quantitative"
                          },
                          "displayName": "Cost (USD)",
                          "format": {
                            "type": "number-currency",
                            "currencyCode": "USD"
                          }
                        },
                        "color": {
