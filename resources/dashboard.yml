resources:
  dashboards:
    idp_cost_tracker:
      display_name: "[${bundle.target}] Intelligent Document Processing (IDP) Cost Tracker"
      warehouse_id: ${var.warehouse_id}
      parent_path: ${var.parent_path}
      embed_credentials: true
      # Inline JSON (not file_path) so DAB substitutes ${var.X} before
      # Terraform receives the content. file_path passes content verbatim and
      # Terraform then chokes on the un-declared ${var.X} references.
      serialized_dashboard: |
        {
          "datasets": [
            {
              "name": "ds_user_list",
              "displayName": "User list for filter",
              "queryLines": [
                "SELECT DISTINCT run_as FROM ${var.catalog}.${var.schema}.v_idp_usage_facts WHERE usage_date >= current_date() - INTERVAL ${var.lookback_90d} DAYS AND run_as IS NOT NULL ORDER BY run_as"
              ]
            },
            {
              "name": "ds_kpi_total_30d",
              "displayName": "KPI total 30d",
              "queryLines": [
                "SELECT workspace_id, run_as, SUM(cost_usd) AS total_cost_usd FROM ${var.catalog}.${var.schema}.v_idp_usage_facts WHERE usage_date >= current_date() - INTERVAL ${var.lookback_30d} DAYS GROUP BY workspace_id, run_as"
              ]
            },
            {
              "name": "ds_kpi_parse_30d",
              "displayName": "KPI parse 30d",
              "queryLines": [
                "SELECT workspace_id, run_as, SUM(cost_usd) AS parse_cost_usd FROM ${var.catalog}.${var.schema}.v_idp_usage_facts WHERE usage_date >= current_date() - INTERVAL ${var.lookback_30d} DAYS AND ai_function = 'AI_PARSE_DOCUMENT' GROUP BY workspace_id, run_as"
              ]
            },
            {
              "name": "ds_kpi_extract_30d",
              "displayName": "KPI extract 30d",
              "queryLines": [
                "SELECT workspace_id, run_as, SUM(cost_usd) AS extract_cost_usd FROM ${var.catalog}.${var.schema}.v_idp_usage_facts WHERE usage_date >= current_date() - INTERVAL ${var.lookback_30d} DAYS AND ai_function = 'AI_EXTRACT' GROUP BY workspace_id, run_as"
              ]
            },
            {
              "name": "ds_daily_trend",
              "displayName": "Daily trend",
              "queryLines": [
                "SELECT usage_date, ai_function, workspace_id, run_as, SUM(cost_usd) AS cost_usd FROM ${var.catalog}.${var.schema}.v_idp_usage_facts WHERE usage_date >= current_date() - INTERVAL ${var.lookback_60d} DAYS GROUP BY usage_date, ai_function, workspace_id, run_as ORDER BY usage_date"
              ]
            },
            {
              "name": "ds_by_workspace",
              "displayName": "By workspace",
              "queryLines": [
                "SELECT workspace_id, run_as, SUM(cost_usd) AS cost_usd FROM ${var.catalog}.${var.schema}.v_idp_usage_facts WHERE usage_date >= current_date() - INTERVAL ${var.lookback_30d} DAYS GROUP BY workspace_id, run_as"
              ]
            },
            {
              "name": "ds_by_function_total",
              "displayName": "Total by function",
              "queryLines": [
                "SELECT ai_function, workspace_id, run_as, SUM(cost_usd) AS cost_usd FROM ${var.catalog}.${var.schema}.v_idp_usage_facts WHERE usage_date >= current_date() - INTERVAL ${var.lookback_30d} DAYS GROUP BY ai_function, workspace_id, run_as"
              ]
            },
            {
              "name": "ds_workload_type",
              "displayName": "By workload type",
              "queryLines": [
                "SELECT workload_type, ai_function, run_as, SUM(cost_usd) AS cost_usd FROM ${var.catalog}.${var.schema}.v_idp_by_workload WHERE usage_date >= current_date() - INTERVAL ${var.lookback_30d} DAYS GROUP BY workload_type, ai_function, run_as"
              ]
            },
            {
              "name": "ds_top_workloads",
              "displayName": "Top workloads 30d",
              "queryLines": [
                "SELECT workload_type, workload_id, COALESCE(workload_label, '') AS workload_label, run_as, ai_function, SUM(cost_usd) AS cost_usd, SUM(dbus) AS dbus, SUM(usage_records) AS records FROM ${var.catalog}.${var.schema}.v_idp_by_workload WHERE usage_date >= current_date() - INTERVAL ${var.lookback_30d} DAYS GROUP BY workload_type, workload_id, workload_label, run_as, ai_function ORDER BY cost_usd DESC LIMIT 50"
              ]
            },
            {
              "name": "ds_top_users",
              "displayName": "Top users 30d",
              "queryLines": [
                "SELECT run_as, ai_function, SUM(cost_usd) AS cost_usd FROM ${var.catalog}.${var.schema}.v_idp_by_user WHERE usage_date >= current_date() - INTERVAL ${var.lookback_30d} DAYS GROUP BY run_as, ai_function ORDER BY cost_usd DESC LIMIT 50"
              ]
            },
            {
              "name": "ds_warehouse_queries",
              "displayName": "Warehouse queries 30d",
              "queryLines": [
                "SELECT executed_by AS run_as, ai_function_detected, warehouse_id, COUNT(*) AS query_count, SUM(duration_seconds) AS total_seconds FROM ${var.catalog}.${var.schema}.v_idp_warehouse_queries WHERE usage_date >= current_date() - INTERVAL ${var.lookback_30d} DAYS AND execution_status = 'FINISHED' GROUP BY executed_by, ai_function_detected, warehouse_id ORDER BY total_seconds DESC LIMIT 100"
              ]
            }
          ],
          "pages": [
            {
              "name": "page_overview",
              "displayName": "Cost Overview",
              "layout": [
                {
                  "widget": {
                    "name": "title_overview",
                    "multilineTextboxSpec": {
                      "lines": [
                        "<h1 style=\"margin: 0 0 4px 0;\">IDP Cost Tracker</h1><div style=\"font-size: 13px; color: #666; font-weight: normal;\">Cost from <code>system.billing.usage</code> (<code>AI_FUNCTIONS</code> product). Last 30 days unless noted \u2014 use the filter to scope by user and/or workspace.</div>"
                      ]
                    }
                  },
                  "position": {
                    "x": 0,
                    "y": 0,
                    "width": 12,
                    "height": 2
                  }
                },
                {
                  "widget": {
                    "name": "user_filter_p1",
                    "queries": [
                      {
                        "name": "dashboards/q_user_list_p1",
                        "query": {
                          "datasetName": "ds_user_list",
                          "fields": [
                            {
                              "name": "run_as",
                              "expression": "`run_as`"
                            }
                          ],
                          "disaggregated": false
                        }
                      },
                      {
                        "name": "dashboards/q_kpi_total_p1",
                        "query": {
                          "datasetName": "ds_kpi_total_30d",
                          "fields": [
                            {
                              "name": "run_as",
                              "expression": "`run_as`"
                            }
                          ],
                          "disaggregated": false
                        }
                      },
                      {
                        "name": "dashboards/q_kpi_parse_p1",
                        "query": {
                          "datasetName": "ds_kpi_parse_30d",
                          "fields": [
                            {
                              "name": "run_as",
                              "expression": "`run_as`"
                            }
                          ],
                          "disaggregated": false
                        }
                      },
                      {
                        "name": "dashboards/q_kpi_extract_p1",
                        "query": {
                          "datasetName": "ds_kpi_extract_30d",
                          "fields": [
                            {
                              "name": "run_as",
                              "expression": "`run_as`"
                            }
                          ],
                          "disaggregated": false
                        }
                      },
                      {
                        "name": "dashboards/q_daily_trend_p1",
                        "query": {
                          "datasetName": "ds_daily_trend",
                          "fields": [
                            {
                              "name": "run_as",
                              "expression": "`run_as`"
                            }
                          ],
                          "disaggregated": false
