                    "spec": {
                      "version": 2,
                      "widgetType": "filter-multi-select",
                      "encodings": {
                        "fields": [
                          {
                            "fieldName": "run_as",
                            "queryName": "dashboards/q_user_list_p1",
                            "displayName": "User"
                          },
                          {
                            "fieldName": "run_as",
                            "queryName": "dashboards/q_kpi_total_p1"
                          },
                          {
                            "fieldName": "run_as",
                            "queryName": "dashboards/q_kpi_parse_p1"
                          },
                          {
                            "fieldName": "run_as",
                            "queryName": "dashboards/q_kpi_extract_p1"
                          },
                          {
                            "fieldName": "run_as",
                            "queryName": "dashboards/q_daily_trend_p1"
                          },
                          {
                            "fieldName": "run_as",
                            "queryName": "dashboards/q_by_workspace_p1"
                          },
                          {
                            "fieldName": "run_as",
                            "queryName": "dashboards/q_by_function_p1"
                          }
                        ]
                      },
                      "frame": {
                        "title": "Filter by user (multi-select)",
                        "showTitle": true
                      }
                    }
                  },
                  "position": {
                    "x": 0,
                    "y": 2,
                    "width": 6,
                    "height": 1
                  }
                },
                {
                  "widget": {
                    "name": "kpi_total",
                    "queries": [
                      {
                        "name": "main_query",
                        "query": {
                          "datasetName": "ds_kpi_total_30d",
                          "fields": [
